# The committed web/data/results.json is the reviewed 1,000-simulation
# artifact; deploys publish it verbatim instead of rebuilding, so the live
# site always matches the audited build and cannot time out.
[build]
  command = "test -s web/data/results.json"
  publish = "web"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
      X-Content-Type-Options = "nosniff"
      X-Frame-Options = "DENY"
